### model
model_name_or_path: ../Models/Sweep/Meta-Llama-3-8b-Instruct-sft-28

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,v_proj

### dataset
dataset: mini-stateval-foundational
template: llama3
cutoff_len: 8192
max_samples: 30000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: ../Finetuning/saves/llama3-8b-instruct/lora/sft_stateval_1_5
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.5e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
fp16: true

### eval
eval_strategy: "no"